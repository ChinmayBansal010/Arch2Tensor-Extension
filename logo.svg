<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background with subtle dark gradient -->
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a" />
      <stop offset="100%" stop-color="#050505" />
    </linearGradient>
    <linearGradient id="cyan-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#81d4fa" />
      <stop offset="100%" stop-color="#4fc3f7" />
    </linearGradient>
  </defs>

  <!-- Rounded App Icon Base -->
  <rect width="128" height="128" rx="28" fill="url(#bg-grad)"/>

  <!-- Glowing Hexagon Outline -->
  <polygon points="64,16 106,40 106,88 64,112 22,88 22,40" 
           fill="none" 
           stroke="rgba(79, 195, 247, 0.2)" 
           stroke-width="8" 
           stroke-linejoin="round"/>
           
  <polygon points="64,16 106,40 106,88 64,112 22,88 22,40" 
           fill="none" 
           stroke="url(#cyan-grad)" 
           stroke-width="4" 
           stroke-linejoin="round"/>

  <!-- Connection Lines (Tensor Network) -->
  <line x1="64" y1="64" x2="44" y2="40" stroke="#4fc3f7" stroke-width="3" stroke-linecap="round"/>
  <line x1="64" y1="64" x2="84" y2="40" stroke="#4fc3f7" stroke-width="3" stroke-linecap="round"/>
  <line x1="64" y1="64" x2="44" y2="88" stroke="#4fc3f7" stroke-width="3" stroke-linecap="round"/>
  <line x1="64" y1="64" x2="84" y2="88" stroke="#4fc3f7" stroke-width="3" stroke-linecap="round"/>
  <line x1="44" y1="40" x2="84" y2="40" stroke="#4fc3f7" stroke-width="3" stroke-linecap="round"/>
  <line x1="44" y1="88" x2="84" y2="88" stroke="#4fc3f7" stroke-width="3" stroke-linecap="round"/>

  <!-- Neural Nodes -->
  <!-- Outer nodes -->
  <circle cx="44" cy="40" r="6" fill="#141414" stroke="#81d4fa" stroke-width="2"/>
  <circle cx="84" cy="40" r="6" fill="#141414" stroke="#81d4fa" stroke-width="2"/>
  <circle cx="44" cy="88" r="6" fill="#141414" stroke="#81d4fa" stroke-width="2"/>
  <circle cx="84" cy="88" r="6" fill="#141414" stroke="#81d4fa" stroke-width="2"/>
  
  <!-- Central core node -->
  <circle cx="64" cy="64" r="12" fill="url(#cyan-grad)"/>
  <circle cx="64" cy="64" r="6" fill="#141414"/>
</svg>
